<style>
__FONTS_CSS__
:root{
  --plum:#153E5E;--cream:#FFF6E0;--paper:#fff;--ink:#1C1212;--ink2:#2E2230;
  --slate:#747474;--line:#E7DFC9;--line2:#C8BDA0;--cream50:#FFFBEF;--cream200:#F4E9CC;
  --terra:#C45A3E;
  --font-d:"gobCL","Arial Black",system-ui,sans-serif;
  --font-b:"Museo Sans","gobCL",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  /* Escala tipografica nombrada (patron ade); piso 12px */
  --fs-overline:12px;--fs-caption:14px;--fs-body:16px;--fs-body-lg:18px;
  --fs-h4:18px;--fs-h3:22px;--fs-h2:28px;

::selection{background:#FFC92E;color:var(--ink);}

<body>
<div id="root"></div>
<div id="paesTip" style="position:fixed;z-index:9999;pointer-events:none;display:none;background:#fff;border:1px solid var(--line2);border-radius:6px;box-shadow:0 6px 20px rgba(21,62,94,.18);padding:10px 12px;max-width:260px;font-family:var(--font-b);"></div>

<script>
"use strict";
// ==== Datos reales (agregados de 32), gzip+base64 -> pako -> JSON ============
var DATA = JSON.parse(pako.inflate(
  Uint8Array.from(atob("__JSON_DATA__"), function(c){return c.charCodeAt(0);}),
  { to: "string" }));
var h = React.createElement;
var M = DATA.meta;

// ==== Indices de acceso O(1) (solo agregados) ===============================
// nsel/np1/pct1: KPI de prioridad de carrera seleccionada -- SOLO existe en
// filas etapa=="seleccion" (null en las otras 5); null tambien cuando esa
// fila esta suprimida (32_agregar_territorial.R ya enmascara ambos a NA).
// Indices con dimension COHORTE (actual/anterior/todas). "todas" reproduce el
// agregado pre-cohorte; es el default de covGet/renGet (backward-compatible).
var COV = {}; // tipo|cod|anio|etapa|cohorte -> {n, sup, nsel, np1, pct1}
(function(){ var c=DATA.cobertura; for(var i=0;i<c.rows;i++){
  COV[c.tipo_entidad[i]+"|"+c.cod_entidad[i]+"|"+c.anio_proceso[i]+"|"+c.etapa[i]+"|"+c.cohorte[i]]={
    n:c.n[i], sup:c.suprimida[i],
    nsel:c.n_seleccionados[i], np1:c.n_prioridad_1[i], pct1:c.pct_prioridad_1[i]
  };
}})();
var REN = {}; // tipo|cod|anio|prueba|cohorte|dependencia -> {n, media, sup}
(function(){ var r=DATA.rendimiento; for(var i=0;i<r.rows;i++){
  REN[r.tipo_entidad[i]+"|"+r.cod_entidad[i]+"|"+r.anio_proceso[i]+"|"+r.prueba[i]+"|"+r.cohorte[i]+"|"+r.grupo_dependencia[i]]={n:r.n[i],media:r.media[i],sup:r.suprimida[i]};
}})();

// ==== Catalogo territorial (nombres + jerarquia) ============================
var T = M.territorios;
var NAME = {};
NAME["nacional:"+T.nacional.cod] = T.nacional.nombre;
T.regiones.forEach(function(x){ NAME["region:"+x.cod]=x.nombre; });
T.sleps.forEach(function(x){ NAME["slep:"+x.cod]=x.nombre; });
T.comunas.forEach(function(x){ NAME["comuna:"+x.cod]=x.nombre; });
NAME["rezagados:"+M.rezagados_label] = M.gen_ant_label;

function terrParse(id){ var i=id.indexOf(":"); return {tipo:id.slice(0,i), cod:id.slice(i+1)}; }
function terrName(id){ return NAME[id] || id; }
function terrTipoLabel(t){ return ({nacional:"Nacional",region:"Región",slep:"SLEP",comuna:"Comuna"})[t]||t; }
// Normalizacion de acentos para el buscador del selector (patron ade): "Viña"
// y "Vina", "Puchuncaví" y "Puchuncavi" matchean igual.
function norm(s){ return String(s==null?"":s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }

var CC = M.costa_central;
var COMPAL = ["#153E5E","#0062A0","#75924E","#4A2746","#BCA493","#C45A3E","#0BA0DA","#8A7C86","#B0855F","#5B7B8A"];
function terrColor(id, idx){
  var p=terrParse(id);
  if(p.tipo==="comuna" && CC.colores[p.cod]) return CC.colores[p.cod];
  return COMPAL[(idx||0) % COMPAL.length];
}

// ==== Accesores de datos (agregado; respetan `suprimida`; dimension cohorte) =
// `coh` (actual/anterior/todas) es opcional: por defecto "todas" (agregado
// completo, == comportamiento pre-cohorte). Las vistas pasan la cohorte activa.
function covGet(id, anio, etapa, coh){ var p=terrParse(id); return COV[p.tipo+"|"+p.cod+"|"+anio+"|"+etapa+"|"+(coh||"todas")]||null; }
function renGet(id, anio, prueba, coh, dep){ var p=terrParse(id); return REN[p.tipo+"|"+p.cod+"|"+anio+"|"+prueba+"|"+(coh||"todas")+"|"+(dep||"todas")]||null; }
// El control de cohorte aplica a TODAS las combinaciones Foco x Vista x Periodo
// (incluida la serie historica; encargo 2, Fase 3).
function activeCohorte(s){ return s.cohorte||"actual"; }
// Sufijo de subtitulo segun cohorte activa ("todas" no agrega sufijo).
function cohorteSub(coh){ return coh==="actual" ? " · cohorte actual" : coh==="anterior" ? " · cohortes anteriores" : ""; }

// --- Filtro "desglose por comuna" -------------------------------------------
// La exclusion de comunas solo es EXACTA cuando el territorio es una REGION: sus
// comunas la particionan (region == suma de sus comunas, verificado). Un SLEP es
// un subconjunto TRANSVERSAL de establecimientos (su total != suma de comunas),
// asi que ahi el desglose es solo informativo (chips no clickeables). nacional
// no trae desglose (childComunas=[]).
function filtroComunaActivo(s){ var p=terrParse(s.terrSel); if(p.tipo!=="region") return false;
  var e=s.comExcl||{}; return Object.keys(e).some(function(k){return e[k];}); }
function comunaExcluida(s,cod){ return !!(s.comExcl&&s.comExcl[cod]); }
// Celda de cobertura del territorio seleccionado con exclusion de comunas
// aplicada (suma de comunas incluidas). Celdas suprimidas se omiten -> el total
// puede ser parcial. Solo activo en REGION con exclusiones; si no, pasa directo.
function covSel(ctx, anio, etapa, coh){
  var s=ctx.state; if(!filtroComunaActivo(s)) return covGet(s.terrSel,anio,etapa,coh);
  var n=0, nsel=0, np1=0, vistos=0, ocultos=0;
  childComunas(s.terrSel).forEach(function(cid){ var cp=terrParse(cid); if(comunaExcluida(s,cp.cod)) return;
    var g=covGet(cid,anio,etapa,coh); if(!g) return;
    if(g.sup){ ocultos++; return; } vistos++; n+=g.n;
    if(g.nsel!=null) nsel+=g.nsel; if(g.np1!=null) np1+=g.np1; });
  if(vistos===0 && ocultos===0) return null;
  return {n:(vistos?n:null), sup:false, parcial:ocultos>0,
          nsel:(nsel||null), np1:(np1||null), pct1:(etapa==="seleccion"&&nsel>0)?100*np1/nsel:null};
}
// Denominador de cobertura: egresados SOLO en cohorte "actual". En "anterior" y
// "todas" el numerador de cada etapa mezcla cohortes (mas personas que los
// egresados del año) -> se rebasa a inscritos, evitando porcentajes >100%.
function baseCob(id, anio, coh){
  if(coh==="actual"){ var eg=covGet(id,anio,"egresados",coh);
    if(eg&&!eg.sup&&eg.n) return eg.n; }
  var ins=covGet(id,anio,"inscripcion",coh);
  return (ins&&!ins.sup&&ins.n) ? ins.n : null;
}
// Analogo para rendimiento: media ponderada por n de las comunas incluidas.
function renSel(ctx, anio, prueba, coh){
  var s=ctx.state, dep=s.dep||"todas"; if(!filtroComunaActivo(s)) return renGet(s.terrSel,anio,prueba,coh,dep);
  var sw=0, n=0;
  childComunas(s.terrSel).forEach(function(cid){ var cp=terrParse(cid); if(comunaExcluida(s,cp.cod)) return;
    var g=renGet(cid,anio,prueba,coh,dep); if(!g||g.sup) return; sw+=g.media*g.n; n+=g.n; });
  if(n===0) return null; return {n:n, media:sw/n, sup:false};
}
// Sufijo de subtitulo cuando hay comunas excluidas (region).
function filtroSub(s){ if(!filtroComunaActivo(s)) return "";
  var kids=childComunas(s.terrSel), incl=kids.filter(function(cid){return !comunaExcluida(s,terrParse(cid).cod);}).length;
  return " · "+incl+" de "+kids.length+" comunas"; }

// ==== Formato =============================================================
function fmt(n){ if(n==null||isNaN(n)) return "—"; return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,"."); }
function fmtPct(x){ if(x==null||isNaN(x)) return "—"; return (x<100? x.toFixed(1).replace(".",",") : "100")+"%"; }
function fmtMean(x){ if(x==null||isNaN(x)) return "—"; return String(Math.round(x)); }
// KPI de prioridad: "62% (n=358)" -- formato pedido para la card standalone.
function fmtPrioridad(pct,n){ if(pct==null||n==null||isNaN(pct)) return null; return Math.round(pct)+"% (n="+fmt(n)+")"; }
var SUP_TXT = "sin dato (resguardo estadístico)"; // copy del patron hermano (idps)
var SUP_SHORT = "resguardo";
var ETAPAS = M.etapas, PRUEBAS = M.pruebas, CONTEXTO = M.contexto;

// ===========================================================================
function App(){
  var st = React.useState({
    foco:"cob", vista:"terr", modo:"actual", cohorte:"actual", dep:"todas",
    notesOpen:false, hoverExp:null,
    terrSel:"slep:"+CC.slep,
    compSel: CC.comunas.map(function(c){return "comuna:"+c;}),
    comExcl:{},  // comunas excluidas del agregado (solo aplica a REGION; ver covSel)
    modalOpen:false, modalQuery:"", modalTab:"comuna"
  });
  var state = st[0], setState = st[1];
  function upd(patch){ setState(Object.assign({}, state, patch)); }
  var ctx = { state:state, upd:upd,
    acc: state.foco==="cob" ? "#0BA0DA" : "#153E5E",
    accSoft: state.foco==="cob" ? "#DCF0FA" : "#DEE5EC" };
  return h("div",{style:{maxWidth:"1320px",margin:"0 auto",background:"var(--cream)",minHeight:"100vh",boxShadow:"0 0 50px rgba(0,0,0,.10)"}},
    TopStrip(), Header(), Controls(ctx), ContextStrip(ctx), ResultsSection(ctx),
    h("div",{style:{padding:"0 40px 40px",marginTop:"26px"}}, Notes(ctx)),
    state.modalOpen ? Modal(ctx) : null);
}

// ---- Chrome ---------------------------------------------------------------
function TopStrip(){
  return h("div",{style:{display:"flex",alignItems:"center",gap:"14px",background:"var(--ink)",color:"var(--cream)",padding:"8px 24px",flexWrap:"wrap"}},
    h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"var(--fs-caption)",letterSpacing:".02em",color:"rgba(255,246,224,.85)"}},"Motor slep_paes"),
    h("span",{style:{width:"1px",height:"13px",background:"rgba(255,246,224,.25)"}}),
    h("span",{style:{fontSize:"var(--fs-caption)",color:"rgba(255,246,224,.6)"}},"El foco (cobertura / rendimiento) es el modo primario y define el color de la vista."),
    h("span",{style:{flex:1}}),
    h("span",{style:{fontSize:"var(--fs-caption)",color:"rgba(255,246,224,.55)"}},"Datos públicos del DEMRE · agregados territoriales"));
}
function Header(){
  return h("div",{style:{background:"var(--plum)",color:"var(--cream)",padding:"26px 40px 22px"}},
    h("div",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"var(--fs-caption)",letterSpacing:".02em",color:"rgba(255,246,224,.7)",marginBottom:"7px"}},"Área de Monitoreo y Seguimiento de Procesos y Resultados Educativos"),
    h("h1",{style:{fontFamily:"var(--font-d)",fontWeight:900,fontSize:"var(--fs-h2)",letterSpacing:"-.01em",lineHeight:1.08,margin:"0 0 8px",color:"var(--cream)"}},
      "Resultados Prueba de Acceso a la Educación Superior (PAES)", h("br"),
      h("span",{style:{fontWeight:400,fontSize:"var(--fs-h3)",color:"rgba(255,246,224,.82)"}},"Participación y desempeño")),
    h("div",{style:{fontSize:"var(--fs-body-lg)",color:"rgba(255,246,224,.72)",fontWeight:400}},"Datos públicos del DEMRE · cobertura nacional"),
    h("p",{style:{margin:"15px 0 0",paddingTop:"15px",borderTop:"1px solid rgba(255,246,224,.16)",color:"rgba(255,246,224,.8)",fontSize:"var(--fs-body)",lineHeight:1.6,maxWidth:"940px",fontWeight:300}},
      "Reporte HTML autocontenido con datos públicos del DEMRE sobre la PAES. Dos focos pares, ninguno subordinado al otro: la cobertura —el embudo de participación— y el rendimiento —la distribución de puntajes—, sobre la misma navegación territorial. Solo se muestran agregados por territorio (nacional, región, SLEP, comuna)."));
}

// ---- Controles ------------------------------------------------------------
function lbl(t){ return h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"var(--fs-caption)",letterSpacing:".01em",color:"var(--slate)"}},t); }
function seg(items,val,on,activeColor){
  return h("div",{style:{display:"inline-flex",background:"var(--cream200)",border:"1px solid var(--line)",borderRadius:"4px",padding:"2px"}},
    items.map(function(it){ return h("button",{key:it.v,onClick:function(){on(it.v);},style:{border:0,padding:"6px 14px",borderRadius:"3px",cursor:"pointer",fontFamily:"var(--font-b)",fontSize:"var(--fs-body)",fontWeight:val===it.v?700:500,background:val===it.v?"#fff":"transparent",color:val===it.v?(activeColor||"var(--plum)"):"var(--ink2)",boxShadow:val===it.v?"0 1px 2px rgba(74,39,70,.14)":"none"}},it.label); }));
}
function FocoTabs(ctx){
  var foco=ctx.state.foco;
  var tabs=[{v:"cob",t:"Cobertura",d:"Embudo de participación · 6 etapas",col:"#0BA0DA"},
            {v:"ren",t:"Rendimiento",d:"Distribución de puntajes · media por prueba",col:"#153E5E"}];
  return h("div",{style:{display:"flex",background:"var(--cream50)",borderBottom:"1px solid var(--line)"}},
    tabs.map(function(tb,i){ var on=foco===tb.v;
      return h("button",{key:tb.v,onClick:function(){ctx.upd({foco:tb.v});},style:{flex:1,textAlign:"left",padding:"14px 22px",cursor:"pointer",background:on?"#fff":"transparent",border:0,borderRight:i===0?"1px solid var(--line)":"0",borderBottom:on?("3px solid "+tb.col):"3px solid transparent"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"9px",marginBottom:"2px"}},
          h("span",{style:{width:"12px",height:"12px",background:tb.col,borderRadius:"2px",opacity:on?1:.35}}),
          h("span",{style:{fontFamily:"var(--font-d)",fontWeight:on?900:400,fontSize:"var(--fs-h4)",color:on?tb.col:"var(--ink2)",letterSpacing:"-.01em"}},tb.t)),
        h("div",{style:{fontSize:"var(--fs-caption)",color:"var(--slate)",paddingLeft:"21px"}},tb.d)); }));
}
function territoryBtn(ctx){
  var label = ctx.state.vista==="comp" ? ("Comparar "+ctx.state.compSel.length+" territorios") : terrName(ctx.state.terrSel);
  // Abre el modal en el tab del nivel actualmente seleccionado (o comuna por
  // defecto en modo comparar); resetea la busqueda al abrir.
  function abrir(){ var t=ctx.state.vista==="comp" ? "comuna" : terrParse(ctx.state.terrSel).tipo;
    if(["comuna","slep","region","nacional"].indexOf(t)<0) t="comuna";
    ctx.upd({modalOpen:true, modalTab:t, modalQuery:""}); }
  return h("button",{onClick:abrir,style:{display:"inline-flex",alignItems:"center",gap:"8px",padding:"7px 12px",background:"#fff",border:"1px solid var(--line2)",borderRadius:"4px",cursor:"pointer",fontFamily:"var(--font-b)",fontWeight:600,fontSize:"var(--fs-body)",color:"var(--ink)"}},
    h("span",{style:{width:"11px",height:"11px",background:"var(--plum)",borderRadius:"2px"}}), label,
    h("span",{style:{color:"var(--slate)",fontSize:"var(--fs-caption)"}},"▾"));
}
// Control de cohorte de 3 estados (segmented, patron seg()). Reemplaza al
// checkbox binario: la cohorte es una eleccion mutuamente excluyente, no un
// on/off. "Actual" = generacion fresca (egreso el año previo); "Anteriores" =
// cohortes anteriores (territorializadas por su RBD de egreso); "Todas" = ambas.
function cohorteSeg(ctx){
  return seg([{v:"actual",label:"Actual"},{v:"anterior",label:"Anteriores"},{v:"todas",label:"Todas"}],
             ctx.state.cohorte, function(v){ctx.upd({cohorte:v});}, ctx.acc);
}
// Corte por dependencia del establecimiento (SOLO focus Rendimiento). Mapeo DEMRE
// de grupo_dependencia: 1=PP, 2=PS, 3 y 4=Mun.; NA -> "sin dato" (~1,3%).
// "Todas" reproduce el agregado sin corte (default, byte-identico al historico).
var DEP_OPCIONES = [{v:"todas",label:"Todas"},{v:"Mun",label:"Municipal"},
  {v:"PS",label:"P. Subv."},{v:"PP",label:"P. Pagado"},{v:"sin_dato",label:"Sin dato"}];
function DEP_NOMBRE(v){ for(var i=0;i<DEP_OPCIONES.length;i++){ if(DEP_OPCIONES[i].v===v) return DEP_OPCIONES[i].label; } return v; }
function depSeg(ctx){ return seg(DEP_OPCIONES, ctx.state.dep||"todas", function(v){ctx.upd({dep:v});}, ctx.acc); }
function depSub(dep){ return (dep && dep!=="todas") ? " · "+DEP_NOMBRE(dep) : ""; }
function Controls(ctx){
  var s=ctx.state, acc=ctx.acc;
  var vistaSeg=seg([{v:"terr",label:"Por territorio"},{v:"comp",label:"Comparar territorios"}],s.vista,function(v){ctx.upd({vista:v});});
  var periodSeg=seg([{v:"actual",label:"Actual"},{v:"hist",label:"Histórica"}],s.modo,function(v){ctx.upd({modo:v});},acc);
  function grupo(label,control){ return h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}}, lbl(label), control); }
  // Cohorte (3 estados) aplica a todas las combinaciones, incluida la historica.
  var cohorteOrHint = grupo("Cohorte", cohorteSeg(ctx));
  // Una sola fila de controles bajo los tabs de foco: Territorio, Vista,
  // Periodo (solo terr) y, a la derecha, Cohorte o el rotulo de contexto.
  // Se omiten elementos con `? ... : null`, sin generar divs vacios.
  var row=h("div",{style:{display:"flex",alignItems:"center",gap:"26px",padding:"12px 40px",background:"var(--paper)",borderBottom:"1px solid var(--line)",flexWrap:"wrap"}},
    grupo("Territorio", territoryBtn(ctx)),
    grupo("Vista", vistaSeg),
    s.vista==="terr" ? grupo("Período", periodSeg) : null,
    h("div",{style:{flex:1}}),
    s.foco==="ren" ? grupo("Dependencia", depSeg(ctx)) : null,
    cohorteOrHint);
  return h("div",{}, FocoTabs(ctx), row);
}

// ---- Franja "Territorio en pantalla" -------------------------------------
function childComunas(id){
  var p=terrParse(id);
  if(p.tipo==="comuna" || p.tipo==="rezagados" || p.tipo==="nacional") return [];
  if(p.tipo==="slep") return T.comunas.filter(function(c){return c.slep===p.cod;}).map(function(c){return "comuna:"+c.cod;});
  if(p.tipo==="region") return T.comunas.filter(function(c){return c.reg===p.cod;}).map(function(c){return "comuna:"+c.cod;});
  return [];
}
function ContextStrip(ctx){
  var s=ctx.state, inner;
  if(s.vista==="comp"){
    inner=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
      h("span",{style:{fontSize:"var(--fs-body)",color:"var(--slate)",fontWeight:500}},"Comparando "+s.compSel.length+" territorios · admite hasta 10:"),
      s.compSel.map(function(id,i){ return h("span",{key:id,style:{display:"inline-flex",alignItems:"center",gap:"6px",padding:"4px 9px",background:"#fff",border:"1px solid var(--line2)",borderRadius:"4px"}},
        h("span",{style:{width:"9px",height:"9px",background:terrColor(id,i),borderRadius:"2px"}}),
        h("span",{style:{fontFamily:"var(--font-b)",fontWeight:600,fontSize:"var(--fs-caption)",color:"var(--ink)"}},terrName(id))); }));
  } else {
    // Se retira el chip grande del territorio: es redundante con el selector de
    // arriba (territoryBtn ya muestra el nombre). La franja queda solo con el
    // desglose por comuna; si el territorio no tiene comunas hijas, no se muestra.
    var kids=childComunas(s.terrSel);
    if(!kids.length) return null;
    // Filtrable solo en REGION (sus comunas la particionan). En SLEP el desglose
    // es informativo (chips no clickeables): el total del SLEP es un subconjunto
    // transversal de establecimientos, no la suma de sus comunas.
    var esRegion = terrParse(s.terrSel).tipo==="region";
    inner=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}},
      h("span",{style:{fontSize:"var(--fs-body)",color:"var(--slate)"}}, esRegion?"Desglose por comuna · clic para incluir o excluir del agregado":"Desglose por comuna"),
      kids.slice(0,12).map(function(cid,i){ var cod=terrParse(cid).cod, eg=covGet(cid,M.anio_actual,"egresados"), off=esRegion&&comunaExcluida(s,cod);
        var contenido=[
          esRegion
            ? h("span",{key:"ck",style:{width:"14px",height:"14px",flex:"none",borderRadius:"3px",border:"1.5px solid "+(off?"var(--slate)":ctx.acc),background:off?"transparent":ctx.acc,display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"var(--fs-overline)",fontWeight:700}}, off?"":"✓")
            : h("span",{key:"dot",style:{width:"11px",height:"11px",flex:"none",background:terrColor(cid,i),borderRadius:"2px"}}),
          h("span",{key:"nm",style:{display:"flex",flexDirection:"column",lineHeight:1.15,textAlign:"left"}},
            h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"var(--fs-body)",color:"var(--ink)",textDecoration:off?"line-through":"none"}},terrName(cid)),

function funnelStages(ctx, anio, coh){
  return ETAPAS.map(function(e){
    // egresados solo es denominador valido en cohorte "actual"; en "anterior" y
    // "todas" el numerador mezcla cohortes -> se rebasa a inscritos (funnelSvg toma
    // como base el primer stage no nulo). Egresados se muestra como "—".
    if(e.k==="egresados" && coh!=="actual") return {k:e.k,label:e.label,n:null,sup:false,present:false};
    var g=covSel(ctx,anio,e.k,coh);  // respeta la exclusion de comunas (region)
    return {k:e.k,label:e.label,n:(g?g.n:null),sup:(g?g.sup:false),present:!!g};
  });
}
// Embudo trapezoidal (6 etapas) — SVG generado a mano (patron prototipo)
function funnelSvg(stages, acc){
  var W=740,labelW=210,areaW=340,cx=labelW+20+areaW/2,slabH=30,gap=17,top=12;
  var base=null; stages.forEach(function(s){ if(s.k==="egresados" && s.n!=null) base=s.n; });
  if(base==null){ stages.forEach(function(s){ if(base==null && s.n!=null) base=s.n; }); }
  var n=stages.length, H=top+n*(slabH+gap)+6, els=[];
  function pctOf(s){ return (base && s.n!=null)? s.n/base*100 : null; }
  for(var i=0;i<n-1;i++){
    var p1=pctOf(stages[i]), p2=pctOf(stages[i+1]); if(p1==null||p2==null) continue;
    var w=p1/100*areaW, w2=p2/100*areaW, yb=top+i*(slabH+gap)+slabH, yt=top+(i+1)*(slabH+gap);
    els.push(h("polygon",{key:"c"+i,points:(cx-w/2)+","+yb+" "+(cx+w/2)+","+yb+" "+(cx+w2/2)+","+yt+" "+(cx-w2/2)+","+yt,fill:acc,opacity:0.12}));
  }
  stages.forEach(function(s,i){
    var pct=pctOf(s), y=top+i*(slabH+gap);
    var w=Math.max((pct!=null?pct:0)/100*areaW,2), x=cx-w/2;
    els.push(h("rect",{key:"r"+i,x:x,y:y,width:w,height:slabH,rx:3,fill:acc,opacity:(0.4+i*0.1).toFixed(2)}));
    els.push(h("text",{key:"l"+i,x:labelW,y:y+slabH/2+4,textAnchor:"end",fill:"var(--ink)",fontFamily:"var(--font-b)",fontWeight:500,fontSize:"var(--fs-caption)"},s.label));
    var rot = s.sup ? SUP_SHORT : (pct!=null? (fmtPct(pct)+" ("+fmt(s.n)+")") : "—");
    els.push(h("text",{key:"p"+i,x:labelW+20+areaW+14,y:y+slabH/2+4,textAnchor:"start",fill:"var(--ink2)",fontFamily:"var(--font-b)",fontWeight:500,fontSize:"var(--fs-body)"},rot));
  });
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto",display:"block"}},els);
}

// Serie historica de cobertura: % rindió y % seleccionado sobre egresados
function lineChart(series,yMin,yMax,unit,W,H,ticks,years){

  var sx=function(i){return padL+i/(years.length-1)*(W-padL-padR);};
  var sy=function(v){return padT+(yMax-v)/(yMax-yMin)*(H-padT-padB);};
  var els=[];
  ticks.forEach(function(t){ els.push(h("line",{key:"g"+t,x1:padL,y1:sy(t),x2:W-padR,y2:sy(t),stroke:"var(--line)",strokeWidth:1}));
    els.push(h("text",{key:"yl"+t,x:padL-10,y:sy(t)+3,textAnchor:"end",fontSize:"var(--fs-overline)",fill:"var(--slate)",fontFamily:"var(--font-b)"},t+(unit||""))); });

  series.forEach(function(s,si){
    var pts=s.vals.map(function(v,i){return v==null?null:[sx(i),sy(v)];});
    var poly=pts.filter(Boolean).map(function(p){return p[0].toFixed(1)+","+p[1].toFixed(1);}).join(" ");
    els.push(h("polyline",{key:"p"+si,points:poly,fill:"none",stroke:s.color,strokeWidth:2.2,strokeDasharray:s.dashed?"5 4":"0"}));

      if(!s.noLabels) els.push(h("text",{key:"t"+si+"_"+i,x:sx(i),y:sy(v)+(below?15:-9),textAnchor:"middle",fontSize:"var(--fs-overline)",fontWeight:700,fill:s.color,fontFamily:"var(--font-d)"},Math.round(v)+(unit||""))); });
  });
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto",display:"block"}},els);
}
function CobHist(ctx){
  var acc=ctx.acc, id=ctx.state.terrSel, years=M.anios, coh=activeCohorte(ctx.state);
  // Base por año: egresados SOLO en "actual". En "anterior" y "todas" el numerador
  // mezcla cohortes -> se rebasa a inscritos = 100% (evita % >100%). En "actual" un
  // año sin egresados (el proceso mas antiguo, sin egreso del año previo en la base)
  // queda en hueco, sin mezclar bases entre años.

    var ins=covSel(ctx,y,"inscripcion",coh); return (ins&&!ins.sup&&ins.n)?ins.n:null; }

  var legend=h("div",{style:{display:"flex",gap:"18px",flexWrap:"wrap",marginBottom:"10px",fontSize:"var(--fs-caption)",color:"var(--ink2)"}},
    lg(acc,"Rindió al menos una prueba ("+baseLbl+")"),

    lineChart([{color:acc,vals:rin,labelPos:"above"},{color:mat2,vals:sel,dashed:true,labelPos:"below"},{color:p1col,vals:p1,noLabels:true}],0,100,"%",720,240,[0,25,50,75,100],years)]);

// Heatmap (comparación) — divergente rojo->pálido->azul, alpha .45

// Marco "Universo de seleccionados": Seleccionado + 1.ª prioridad forman un grupo

  h("span",{style:{fontSize:"var(--fs-overline)",fontWeight:700,color:"var(--slate)"}},SUP_SHORT)); }
function CobComp(ctx){
  var acc=ctx.acc, ids=ctx.state.compSel, anio=M.anio_actual, coh=activeCohorte(ctx.state);
  var keys=["inscripcion","rendicion","resultados","postulacion","seleccion"];
  var heads=["Territorio","Egresados","Inscritos","Rindió","Válidos","Postuló","Seleccionado","1.ª prioridad"];
  // Denominador por territorio via baseCob: egresados solo en "actual"; en
  // "anterior"/"todas" se rebasa a inscritos (evita porcentajes >100%).
  function baseN(id){ return baseCob(id, anio, coh); }

  function norm(k,pct){ var r=ranges[k]; return r[1]>r[0]?(pct-r[0])/(r[1]-r[0]):0.5; }
  // "1.ª prioridad" no es "% de egresados" como las 5 columnas del embudo -- es

  // normaliza sobre ese pct directo, con su propio rango (rangoP1).
