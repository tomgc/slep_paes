<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resultados PAES · Cobertura y rendimiento · SLEP Costa Central</title>
<style>
__FONTS_CSS__
:root{
  --plum:#153E5E;--cream:#FFF6E0;--paper:#fff;--ink:#1C1212;--ink2:#2E2230;
  --slate:#747474;--line:#E7DFC9;--line2:#C8BDA0;--cream50:#FFFBEF;--cream200:#F4E9CC;
  --terra:#C45A3E;
  --font-d:"gobCL","Arial Black",system-ui,sans-serif;
  --font-b:"Museo Sans","gobCL",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#E9E0CC;}
body{font-family:var(--font-b);color:var(--ink);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::selection{background:#FFC92E;color:var(--ink);}
button{font-family:var(--font-b);}
table{border-collapse:collapse;}
</style>
</head>
<body>
<div id="root"></div>
<div id="paesTip" style="position:fixed;z-index:9999;pointer-events:none;display:none;background:#fff;border:1px solid var(--line2);border-radius:6px;box-shadow:0 6px 20px rgba(21,62,94,.18);padding:10px 12px;max-width:260px;font-family:var(--font-b);"></div>

<script>__REACT_INLINE__</script>
<script>__REACTDOM_INLINE__</script>
<script>__D3_INLINE__</script>
<script>__PAKO_INLINE__</script>
<script>
"use strict";
// ==== Datos reales (agregados de 32), gzip+base64 -> pako -> JSON ============
var DATA = JSON.parse(pako.inflate(
  Uint8Array.from(atob("__JSON_DATA__"), function(c){return c.charCodeAt(0);}),
  { to: "string" }));
var h = React.createElement;
var M = DATA.meta;

// ==== Indices de acceso O(1) (solo agregados) ===============================
var COV = {}; // tipo|cod|anio|etapa -> {n, sup}
(function(){ var c=DATA.cobertura; for(var i=0;i<c.rows;i++){
  COV[c.tipo_entidad[i]+"|"+c.cod_entidad[i]+"|"+c.anio_proceso[i]+"|"+c.etapa[i]]={n:c.n[i],sup:c.suprimida[i]};
}})();
var REN = {}; // tipo|cod|anio|prueba -> {n, media, sup}
(function(){ var r=DATA.rendimiento; for(var i=0;i<r.rows;i++){
  REN[r.tipo_entidad[i]+"|"+r.cod_entidad[i]+"|"+r.anio_proceso[i]+"|"+r.prueba[i]]={n:r.n[i],media:r.media[i],sup:r.suprimida[i]};
}})();

// ==== Catalogo territorial (nombres + jerarquia) ============================
var T = M.territorios;
var NAME = {};
NAME["nacional:"+T.nacional.cod] = T.nacional.nombre;
T.regiones.forEach(function(x){ NAME["region:"+x.cod]=x.nombre; });
T.sleps.forEach(function(x){ NAME["slep:"+x.cod]=x.nombre; });
T.comunas.forEach(function(x){ NAME["comuna:"+x.cod]=x.nombre; });
NAME["rezagados:"+M.rezagados_label] = M.gen_ant_label;
var REZ_ID = "rezagados:"+M.rezagados_label;

function terrParse(id){ var i=id.indexOf(":"); return {tipo:id.slice(0,i), cod:id.slice(i+1)}; }
function terrName(id){ return NAME[id] || id; }
function terrTipoLabel(t){ return ({nacional:"Nacional",region:"Región",slep:"SLEP",comuna:"Comuna"})[t]||t; }

var CC = M.costa_central;
var COMPAL = ["#153E5E","#0062A0","#75924E","#4A2746","#BCA493","#C45A3E","#0BA0DA","#8A7C86","#B0855F","#5B7B8A"];
function terrColor(id, idx){
  var p=terrParse(id);
  if(p.tipo==="comuna" && CC.colores[p.cod]) return CC.colores[p.cod];
  return COMPAL[(idx||0) % COMPAL.length];
}

// ==== Accesores de datos (agregado; respetan `suprimida`) ===================
function covGet(id, anio, etapa){ var p=terrParse(id); return COV[p.tipo+"|"+p.cod+"|"+anio+"|"+etapa]||null; }
function renGet(id, anio, prueba){ var p=terrParse(id); return REN[p.tipo+"|"+p.cod+"|"+anio+"|"+prueba]||null; }

// ==== Formato =============================================================
function fmt(n){ if(n==null||isNaN(n)) return "—"; return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,"."); }
function fmtPct(x){ if(x==null||isNaN(x)) return "—"; return (x<100? x.toFixed(1).replace(".",",") : "100")+"%"; }
function fmtMean(x){ if(x==null||isNaN(x)) return "—"; return String(Math.round(x)); }
var SUP_TXT = "sin dato (resguardo estadístico)"; // copy del patron hermano (idps)
var SUP_SHORT = "resguardo";
var ETAPAS = M.etapas, PRUEBAS = M.pruebas, CONTEXTO = M.contexto;

// ===========================================================================
function App(){
  var st = React.useState({
    foco:"cob", vista:"terr", modo:"actual", showRez:true,
    notesOpen:false, hoverExp:null,
    terrSel:"slep:"+CC.slep,
    compSel: CC.comunas.map(function(c){return "comuna:"+c;}),
    modalOpen:false, modalQuery:""
  });
  var state = st[0], setState = st[1];
  function upd(patch){ setState(Object.assign({}, state, patch)); }
  var ctx = { state:state, upd:upd,
    acc: state.foco==="cob" ? "#0BA0DA" : "#153E5E",
    accSoft: state.foco==="cob" ? "#DCF0FA" : "#DEE5EC" };
  return h("div",{style:{maxWidth:"1320px",margin:"0 auto",background:"var(--cream)",minHeight:"100vh",boxShadow:"0 0 50px rgba(0,0,0,.10)"}},
    TopStrip(), Header(), Controls(ctx), ContextStrip(ctx), ResultsSection(ctx),
    h("div",{style:{padding:"0 40px 40px",marginTop:"26px"}}, Notes(ctx)),
    state.modalOpen ? Modal(ctx) : null);
}

// ---- Chrome ---------------------------------------------------------------
function TopStrip(){
  return h("div",{style:{display:"flex",alignItems:"center",gap:"14px",background:"var(--ink)",color:"var(--cream)",padding:"8px 24px",flexWrap:"wrap"}},
    h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"11px",letterSpacing:".02em",color:"rgba(255,246,224,.85)"}},"Motor slep_paes"),
    h("span",{style:{width:"1px",height:"13px",background:"rgba(255,246,224,.25)"}}),
    h("span",{style:{fontSize:"11.5px",color:"rgba(255,246,224,.6)"}},"El foco (cobertura / rendimiento) es el modo primario y define el color de la vista."),
    h("span",{style:{flex:1}}),
    h("span",{style:{fontSize:"11px",color:"rgba(255,246,224,.55)"}},"Datos públicos del DEMRE · agregados territoriales"));
}
function Header(){
  return h("div",{style:{background:"var(--plum)",color:"var(--cream)",padding:"26px 40px 22px"}},
    h("div",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"11px",letterSpacing:".02em",color:"rgba(255,246,224,.7)",marginBottom:"7px"}},"Área de Monitoreo y Seguimiento de Procesos y Resultados Educativos"),
    h("h1",{style:{fontFamily:"var(--font-d)",fontWeight:900,fontSize:"30px",letterSpacing:"-.01em",lineHeight:1.08,margin:"0 0 8px",color:"var(--cream)"}},
      "Resultados Prueba de Acceso a la Educación Superior (PAES)", h("br"),
      h("span",{style:{fontWeight:400,fontSize:"22px",color:"rgba(255,246,224,.82)"}},"Participación y desempeño")),
    h("div",{style:{fontSize:"14px",color:"rgba(255,246,224,.72)",fontWeight:400}},"Datos públicos del DEMRE · cobertura nacional"),
    h("p",{style:{margin:"15px 0 0",paddingTop:"15px",borderTop:"1px solid rgba(255,246,224,.16)",color:"rgba(255,246,224,.8)",fontSize:"13px",lineHeight:1.6,maxWidth:"940px",fontWeight:300}},
      "Reporte HTML autocontenido con datos públicos del DEMRE sobre la PAES. Dos focos pares, ninguno subordinado al otro: la cobertura —el embudo de participación— y el rendimiento —la distribución de puntajes—, sobre la misma navegación territorial. Solo se muestran agregados por territorio (nacional, región, SLEP, comuna)."));
}

// ---- Controles ------------------------------------------------------------
function lbl(t){ return h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"11px",letterSpacing:".01em",color:"var(--slate)"}},t); }
function seg(items,val,on,activeColor){
  return h("div",{style:{display:"inline-flex",background:"var(--cream200)",border:"1px solid var(--line)",borderRadius:"4px",padding:"2px"}},
    items.map(function(it){ return h("button",{key:it.v,onClick:function(){on(it.v);},style:{border:0,padding:"6px 14px",borderRadius:"3px",cursor:"pointer",fontFamily:"var(--font-b)",fontSize:"13px",fontWeight:val===it.v?700:500,background:val===it.v?"#fff":"transparent",color:val===it.v?(activeColor||"var(--plum)"):"var(--ink2)",boxShadow:val===it.v?"0 1px 2px rgba(74,39,70,.14)":"none"}},it.label); }));
}
function FocoTabs(ctx){
  var foco=ctx.state.foco;
  var tabs=[{v:"cob",t:"Cobertura",d:"Embudo de participación · 6 etapas",col:"#0BA0DA"},
            {v:"ren",t:"Rendimiento",d:"Distribución de puntajes · media por prueba",col:"#153E5E"}];
  return h("div",{style:{display:"flex",background:"var(--cream50)",borderBottom:"1px solid var(--line)"}},
    tabs.map(function(tb,i){ var on=foco===tb.v;
      return h("button",{key:tb.v,onClick:function(){ctx.upd({foco:tb.v});},style:{flex:1,textAlign:"left",padding:"14px 22px",cursor:"pointer",background:on?"#fff":"transparent",border:0,borderRight:i===0?"1px solid var(--line)":"0",borderBottom:on?("3px solid "+tb.col):"3px solid transparent"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"9px",marginBottom:"2px"}},
          h("span",{style:{width:"12px",height:"12px",background:tb.col,borderRadius:"2px",opacity:on?1:.35}}),
          h("span",{style:{fontFamily:"var(--font-d)",fontWeight:on?900:400,fontSize:"18px",color:on?tb.col:"var(--ink2)",letterSpacing:"-.01em"}},tb.t)),
        h("div",{style:{fontSize:"11.5px",color:"var(--slate)",paddingLeft:"21px"}},tb.d)); }));
}
function territoryBtn(ctx){
  var label = ctx.state.vista==="comp" ? ("Comparar "+ctx.state.compSel.length+" territorios") : terrName(ctx.state.terrSel);
  return h("button",{onClick:function(){ctx.upd({modalOpen:true});},style:{display:"inline-flex",alignItems:"center",gap:"8px",padding:"7px 12px",background:"#fff",border:"1px solid var(--line2)",borderRadius:"4px",cursor:"pointer",fontFamily:"var(--font-b)",fontWeight:600,fontSize:"13px",color:"var(--ink)"}},
    h("span",{style:{width:"11px",height:"11px",background:"var(--plum)",borderRadius:"2px"}}), label,
    h("span",{style:{color:"var(--slate)",fontSize:"11px"}},"▾"));
}
function genAntToggle(ctx){
  var on=ctx.state.showRez, acc=ctx.acc;
  return h("button",{onClick:function(){ctx.upd({showRez:!on});},title:"Mostrar u ocultar la categoría generaciones anteriores",style:{display:"inline-flex",alignItems:"center",gap:"8px",padding:"6px 11px",background:on?"#fff":"transparent",border:"1px solid "+(on?"var(--line2)":"var(--line)"),borderRadius:"4px",cursor:"pointer"}},
    h("span",{style:{width:"15px",height:"15px",flex:"none",borderRadius:"3px",border:"1.5px solid "+(on?acc:"var(--slate)"),background:on?acc:"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"10px",fontWeight:700}}, on?"✓":""),
    h("span",{style:{display:"flex",flexDirection:"column",lineHeight:1.15,textAlign:"left"}},
      h("span",{style:{fontSize:"12.5px",fontWeight:600,color:"var(--ink)"}},"Generaciones anteriores"),
      h("span",{style:{fontSize:"10px",color:"var(--slate)"}}, on?"visibles en el detalle":"ocultas del detalle (categoría siempre reportada)")));
}
function Controls(ctx){
  var s=ctx.state, acc=ctx.acc;
  var vistaSeg=seg([{v:"terr",label:"Por territorio"},{v:"comp",label:"Comparar territorios"}],s.vista,function(v){ctx.upd({vista:v});});
  var periodSeg=seg([{v:"actual",label:"Actual"},{v:"hist",label:"Histórica"}],s.modo,function(v){ctx.upd({modo:v});},acc);
  var secondary=h("div",{style:{display:"flex",alignItems:"center",gap:"26px",padding:"12px 40px",background:"var(--paper)",borderBottom:"1px solid var(--line)",flexWrap:"wrap"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}}, lbl("Vista"), vistaSeg),
    s.vista==="terr" ? h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}}, lbl("Período"), periodSeg) : null,
    h("div",{style:{flex:1}}),
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}}, lbl("Territorio"), territoryBtn(ctx)));
  var sub=h("div",{style:{display:"flex",alignItems:"center",gap:"24px",padding:"11px 40px",background:"var(--cream50)",borderBottom:"1px solid var(--line)",flexWrap:"wrap"}},
    (s.vista==="terr" && s.modo==="actual")
      ? h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}}, lbl("Cohorte"), genAntToggle(ctx))
      : h("span",{style:{fontSize:"11.5px",color:"var(--slate)"}}, s.modo==="hist" ? ("Serie "+M.anios[0]+"–"+M.anios[M.anios.length-1]+" · proceso de cada año") : ("Comparación entre territorios · admisión "+M.anio_actual)));
  return h("div",{}, FocoTabs(ctx), secondary, sub);
}

// ---- Franja "Territorio en pantalla" -------------------------------------
function childComunas(id){
  var p=terrParse(id);
  if(p.tipo==="comuna" || p.tipo==="rezagados" || p.tipo==="nacional") return [];
  if(p.tipo==="slep") return T.comunas.filter(function(c){return c.slep===p.cod;}).map(function(c){return "comuna:"+c.cod;});
  if(p.tipo==="region") return T.comunas.filter(function(c){return c.reg===p.cod;}).map(function(c){return "comuna:"+c.cod;});
  return [];
}
function ContextStrip(ctx){
  var s=ctx.state, inner;
  if(s.vista==="comp"){
    inner=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
      h("span",{style:{fontSize:"12px",color:"var(--slate)",fontWeight:500}},"Comparando "+s.compSel.length+" territorios · admite hasta 10:"),
      s.compSel.map(function(id,i){ return h("span",{key:id,style:{display:"inline-flex",alignItems:"center",gap:"6px",padding:"4px 9px",background:"#fff",border:"1px solid var(--line2)",borderRadius:"4px"}},
        h("span",{style:{width:"9px",height:"9px",background:terrColor(id,i),borderRadius:"2px"}}),
        h("span",{style:{fontFamily:"var(--font-b)",fontWeight:600,fontSize:"11.5px",color:"var(--ink)"}},terrName(id))); }));
  } else {
    var id=s.terrSel, p=terrParse(id);
    var chip=h("span",{style:{display:"inline-flex",alignItems:"center",gap:"9px",padding:"8px 14px",background:"var(--plum)",borderRadius:"4px"}},
      h("span",{style:{width:"13px",height:"13px",background:"var(--cream)",borderRadius:"2px"}}),
      h("span",{style:{display:"flex",flexDirection:"column",lineHeight:1.15}},
        h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"13px",color:"var(--cream)"}},terrName(id)),
        h("span",{style:{fontSize:"10px",color:"rgba(255,246,224,.7)"}}, terrTipoLabel(p.tipo)+" · admisión "+M.anio_actual)));
    var kids=childComunas(id);
    inner=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}},
      chip,
      kids.length? h("span",{style:{fontSize:"12px",color:"var(--slate)"}},"con desglose por comuna:") : null,
      kids.slice(0,12).map(function(cid,i){ var eg=covGet(cid,M.anio_actual,"egresados");
        return h("span",{key:cid,style:{display:"inline-flex",alignItems:"center",gap:"8px",padding:"5px 10px",background:"#fff",border:"1px solid var(--line2)",borderRadius:"4px"}},
          h("span",{style:{width:"11px",height:"11px",background:terrColor(cid,i),borderRadius:"2px"}}),
          h("span",{style:{display:"flex",flexDirection:"column",lineHeight:1.15}},
            h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"12px",color:"var(--ink)"}},terrName(cid)),
            h("span",{style:{fontSize:"10px",color:"var(--slate)"}}, (eg&&!eg.sup? fmt(eg.n)+" egresados" : SUP_SHORT)))); }));
  }
  return h("div",{style:{padding:"14px 40px",background:"var(--cream50)",borderBottom:"1px solid var(--line)"}},
    h("div",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"11px",letterSpacing:".02em",color:"var(--slate)",marginBottom:"10px"}},"Territorio en pantalla"),
    inner);
}

// ---- Utilidades de tarjeta / nota ----------------------------------------
function noteStrip(text,acc,soft){ return h("div",{style:{background:soft,borderLeft:"3px solid "+acc,padding:"10px 14px",borderRadius:"0 4px 4px 0",fontSize:"12.5px",color:"var(--ink2)",lineHeight:1.5,maxWidth:"940px"}},text); }
function card(extra,children){ return h("div",{style:Object.assign({background:"#fff",border:"1px solid var(--line)",borderRadius:"8px",padding:"18px",boxShadow:"0 2px 8px rgba(74,39,70,.08)"},extra||{})},children); }
function cardTitle(t,sub){ return h("div",{style:{marginBottom:"12px"}}, h("div",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"15px",color:"var(--ink)"}},t), sub?h("div",{style:{fontSize:"11px",color:"var(--slate)",marginTop:"2px"}},sub):null); }
function supBox(hgt){ return h("div",{style:{height:hgt+"px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#E7E1D2",borderRadius:"4px"}},
  h("span",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"12px",color:"var(--slate)"}},"Sin dato"),
  h("span",{style:{fontSize:"10px",color:"var(--slate)",marginTop:"2px"}},"resguardo estadístico · n < "+M.umbral)); }

// ---- Meta de vista --------------------------------------------------------
function viewMeta(ctx){
  var s=ctx.state, f=s.foco, v=s.vista, m=s.modo;
  if(f==="cob"){
    if(v==="terr") return m==="hist"
      ? {t:"Cobertura en el tiempo", sub:terrName(s.terrSel)+" · participación PAES · "+M.anios[0]+"–"+M.anios[M.anios.length-1], note:"Serie histórica por proceso de admisión. La categoría de generaciones anteriores se reporta siempre; nunca se trata como error."}
      : {t:"Embudo de participación PAES", sub:terrName(s.terrSel)+" · admisión "+M.anio_actual+" · egresados → selección", note:"El embudo tiene 6 etapas (sin matrícula, no disponible en el agregado). Las generaciones anteriores se reportan como bucket nacional agregado; el control de cohorte las muestra u oculta del detalle."};
    return {t:"Cobertura — comparación entre territorios", sub:"Embudo por territorio · admisión "+M.anio_actual+" · porcentaje (n)", note:"Comparación en porcentaje sobre egresados, con el número de casos entre paréntesis: % (n). Celdas con n < "+M.umbral+" se muestran como «"+SUP_TXT+"»."};
  } else {
    if(v==="terr") return m==="hist"
      ? {t:"Rendimiento en el tiempo", sub:terrName(s.terrSel)+" · media por prueba · "+M.anios[0]+"–"+M.anios[M.anios.length-1], note:"Serie histórica de la media de puntaje por prueba (escala "+M.escala.min+"–"+M.escala.max+"). La mediana no está disponible en el agregado; se reporta la media."}
      : {t:"Distribución de puntajes PAES", sub:terrName(s.terrSel)+" · media por prueba · escala "+M.escala.min+"–"+M.escala.max+" · NEM y Ranking como contexto", note:"Se reporta la media por prueba (agregado territorial, no microdato). NEM y Ranking se muestran como contexto (no son pruebas PAES). Celdas con n < "+M.umbral+" se resguardan."};
    return {t:"Rendimiento — comparación entre territorios", sub:"Media de puntaje por prueba · admisión "+M.anio_actual+" · media (n)", note:"Cada celda muestra la media de puntaje y, entre paréntesis, el número de casos. Heatmap por columna: menor media = más alerta. NEM y Ranking van como contexto."};
  }
}
function ResultsSection(ctx){
  var vm=viewMeta(ctx), acc=ctx.acc, soft=ctx.accSoft;
  return h("div",{style:{padding:"24px 40px 8px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"16px"}},
      h("div",{style:{fontFamily:"var(--font-d)",fontWeight:400,fontSize:"11px",letterSpacing:".02em",color:"var(--slate)",marginBottom:"4px"}},"Resultados"),
      ExportBar(ctx)),
    h("h2",{style:{fontFamily:"var(--font-d)",fontWeight:900,fontSize:"23px",letterSpacing:"-.005em",lineHeight:1.15,margin:0,color:"var(--ink)"}},vm.t),
    h("div",{style:{fontSize:"13px",color:"var(--slate)",marginTop:"3px",fontWeight:400}},vm.sub),
    h("div",{style:{marginTop:"14px"}}, noteStrip(vm.note,acc,soft)),
    h("div",{id:"paesWork",style:{marginTop:"16px"}}, WorkArea(ctx)));
}
function WorkArea(ctx){
  var s=ctx.state;
  if(s.foco==="cob") return s.vista==="comp" ? CobComp(ctx) : (s.modo==="hist" ? CobHist(ctx) : CobActual(ctx));
  return s.vista==="comp" ? RenComp(ctx) : (s.modo==="hist" ? RenHist(ctx) : RenActual(ctx));
}

// ===========================================================================
// VISTAS (Fase 3)
// ===========================================================================
function funnelStages(id, anio){
  return ETAPAS.map(function(e){
    var g=covGet(id,anio,e.k);
    return {k:e.k,label:e.label,n:(g?g.n:null),sup:(g?g.sup:false),present:!!g};
  });
}
// Embudo trapezoidal (6 etapas) — SVG generado a mano (patron prototipo)
function funnelSvg(stages, acc){
  var W=740,labelW=210,areaW=340,cx=labelW+20+areaW/2,slabH=30,gap=17,top=12;
  var base=null; stages.forEach(function(s){ if(s.k==="egresados" && s.n!=null) base=s.n; });
  if(base==null){ stages.forEach(function(s){ if(base==null && s.n!=null) base=s.n; }); }
  var n=stages.length, H=top+n*(slabH+gap)+6, els=[];
  function pctOf(s){ return (base && s.n!=null)? s.n/base*100 : null; }
  for(var i=0;i<n-1;i++){
    var p1=pctOf(stages[i]), p2=pctOf(stages[i+1]); if(p1==null||p2==null) continue;
    var w=p1/100*areaW, w2=p2/100*areaW, yb=top+i*(slabH+gap)+slabH, yt=top+(i+1)*(slabH+gap);
    els.push(h("polygon",{key:"c"+i,points:(cx-w/2)+","+yb+" "+(cx+w/2)+","+yb+" "+(cx+w2/2)+","+yt+" "+(cx-w2/2)+","+yt,fill:acc,opacity:0.12}));
  }
  stages.forEach(function(s,i){

function Modal(ctx){
  var s=ctx.state, multi=s.vista==="comp";
  var query=s.modalQuery||""; function setQuery(v){ ctx.upd({modalQuery:v}); }
  var sel = multi ? s.compSel.slice() : [s.terrSel];
  function isSel(id){ return sel.indexOf(id)>=0; }
  function pick(id){
    if(multi){
      var arr=s.compSel.slice(), i=arr.indexOf(id);
      if(i>=0){ if(arr.length>1) arr.splice(i,1); }
      else { if(arr.length<10) arr.push(id); }
      ctx.upd({compSel:arr});
    } else { ctx.upd({terrSel:id, modalOpen:false}); }
  }
  var qn=query.trim().toLowerCase();
  function match(id){ return !qn || terrName(id).toLowerCase().indexOf(qn)>=0; }
  // construir arbol: nacional, regiones -> sleps -> comunas ; comunas sin slep bajo region
  var nodes=[];
  nodes.push({id:"nacional:"+T.nacional.cod, lvl:0, tipo:"nacional"});
  T.regiones.forEach(function(r){
    var rid="region:"+r.cod, rkids=[];
    var rsleps=T.sleps.filter(function(sp){return sp.reg===r.cod;});
    var scodes={};
    rsleps.forEach(function(sp){ scodes[sp.cod]=true; });
    var comReg=T.comunas.filter(function(c){return c.reg===r.cod;});
    var anyMatch=match(rid) || rsleps.some(function(sp){return match("slep:"+sp.cod);}) || comReg.some(function(c){return match("comuna:"+c.cod);});
    if(!anyMatch) return;
    nodes.push({id:rid,lvl:0,tipo:"region"});
    rsleps.forEach(function(sp){
      var spid="slep:"+sp.cod;
      var spcom=comReg.filter(function(c){return c.slep===sp.cod;});
      var spMatch=match(spid)||spcom.some(function(c){return match("comuna:"+c.cod);});
      if(!spMatch) return;
      nodes.push({id:spid,lvl:1,tipo:"slep"});
